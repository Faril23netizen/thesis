# strongSwan IPsec Configuration — RPi5 as N3IWUE
# ===================================================
# File ini diletakkan di: /etc/ipsec.conf pada Raspberry Pi 5
#
# Arsitektur:
#   Pico WH ──(TCP Wi-Fi)──► RPi5 ──(IPsec IKEv2)──► Amarisoft N3IWF ──► 5GC
#
# RPi5 bertindak sebagai N3IWUE (Non-3GPP Interworking UE)
# yang membangun tunnel IPsec ke Amarisoft N3IWF Callbox.
#
# Sesuaikan variabel berikut:
#   N3IWF_IP   = IP address Amarisoft N3IWF Callbox
#   RPI5_IP    = IP address Raspberry Pi 5 (interface ke Callbox)

config setup
    charondebug="ike 2, knl 2, cfg 2, net 2, esp 2, dmn 2, mgr 2"
    uniqueids=no

conn %default
    keyexchange=ikev2
    ike=aes256-sha256-modp2048!
    esp=aes256-sha256!
    dpdaction=restart
    dpddelay=30s

conn aquaculture-n3iwf
    # === GANTI DENGAN IP ASLI ===
    left=192.168.1.200          # IP RPi5 yang mengarah ke Amarisoft Callbox
    leftid=aquaculture-rpi5@thesis.local
    leftsubnet=0.0.0.0/0

    right=192.168.1.10          # IP Amarisoft N3IWF Callbox — GANTI INI
    rightid=n3iwf@amarisoft.local
    rightsubnet=0.0.0.0/0

    authby=secret               # PSK — samakan dengan ipsec.secrets dan Amarisoft config
    auto=start
    type=tunnel

    # Retry otomatis jika koneksi terputus
    closeaction=restart
    dpdtimeout=60s
