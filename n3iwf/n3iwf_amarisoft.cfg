/* Amarisoft N3IWF Configuration
 * ================================
 * File: config/n3iwf.cfg di Amarisoft Callbox
 *
 * Salin konfigurasi ini ke Amarisoft Callbox dan sesuaikan IP-nya.
 * Jalankan di Callbox: sudo ./lten3iwf config/n3iwf.cfg
 *
 * Referensi: https://tech-academy.amarisoft.com/lten3iwf.doc
 */
{
    /* IP address interface Amarisoft N3IWF Callbox */
    /* GANTI dengan IP asli interface Callbox ke jaringan lokal */
    local_addr: "192.168.1.10",

    /* 5G Core AMF address — biasanya localhost jika di Callbox yang sama */
    amf_list: [
        {
            addr: "127.0.0.1",   /* Ganti jika AMF terpisah */
            port: 38412
        }
    ],

    /* PLMN — sesuaikan dengan konfigurasi Amarisoft gNB */
    plmn: "00101",

    /* IPsec / IKEv2 konfigurasi */
    ike: {
        /* PSK — HARUS SAMA dengan ipsec.secrets di RPi5 */
        psk: "AquacultureThesis2025",

        /* Izinkan N3IWUE dari RPi5 */
        ue_list: [
            {
                /* ID RPi5 sebagai N3IWUE */
                id: "aquaculture-rpi5@thesis.local",
                /* IP address Raspberry Pi 5 */
                addr: "192.168.1.200"   /* GANTI dengan IP RPi5 yang asli */
            }
        ]
    },

    /* Log level untuk debugging */
    log_options: "all.level=debug",
    log_filename: "/tmp/n3iwf.log"
}
